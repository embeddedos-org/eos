# EoS Board: Generic Cortex-A76 (RK3588)
board:
  name: generic-cortex-a76
  mcu: RK3588
  family: RK35
  arch: arm64
  core: cortex-a76
  vendor: Rockchip
  clock_hz: 2400000000
  memory:
    flash: 0
    ram: 8589934592
  peripherals:
    - {name: UART0, type: uart, bus: apb}
    - {name: SPI0, type: spi, bus: apb}
    - {name: I2C0, type: i2c, bus: apb}
    - {name: GPIO, type: gpio, count: 160}
    - {name: GMAC0, type: ethernet, bus: ahb}
    - {name: USB3, type: usb, speed: super}
    - {name: GPU, type: gpu, bus: axi}
    - {name: NPU, type: npu, bus: axi}
    - {name: PCIE, type: pcie, bus: axi}
    - {name: WDT, type: watchdog, bus: apb}
    - {name: DMA, type: dma, bus: ahb}
  features: [cortex-a76, mmu, neon, fpu, smp, npu, pcie]
  toolchain: aarch64-linux-gnu
