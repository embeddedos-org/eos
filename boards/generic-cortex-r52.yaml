# EoS Board: Generic Cortex-R52 (Reference)
board:
  name: generic-cortex-r52
  mcu: Cortex-R52
  family: Cortex-R52
  arch: arm
  core: cortex-r52
  vendor: ARM
  clock_hz: 800000000
  memory:
    flash: 4194304
    ram: 1048576
  peripherals:
    - {name: UART0, type: uart, bus: apb}
    - {name: SPI0, type: spi, bus: apb}
    - {name: I2C0, type: i2c, bus: apb}
    - {name: GPIO, type: gpio, count: 64}
    - {name: TIMER0, type: timer, bus: apb}
    - {name: ETH, type: ethernet, bus: ahb}
    - {name: WDT, type: watchdog, bus: apb}
    - {name: DMA0, type: dma, bus: ahb}
  features: [cortex-r52, fpu, mpu, virtualization, ecc, safety]
  toolchain: arm-none-eabi
