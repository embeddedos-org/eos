# EoS Board: Generic Cortex-M0+ (STM32L072)
board:
  name: generic-cortex-m0plus
  mcu: STM32L072
  family: STM32L0
  arch: arm
  core: cortex-m0+
  vendor: ST Microelectronics
  clock_hz: 32000000
  memory:
    flash: 196608
    ram: 20480
  peripherals:
    - {name: USART1, type: uart, bus: apb2}
    - {name: SPI1, type: spi, bus: apb2}
    - {name: I2C1, type: i2c, bus: apb1}
    - {name: GPIO, type: gpio, count: 51}
    - {name: ADC1, type: adc, bus: apb, channels: 16}
    - {name: TIM2, type: timer, bus: apb1}
    - {name: USB, type: usb, speed: full}
    - {name: WDT, type: watchdog, bus: apb1}
    - {name: DMA1, type: dma, bus: ahb}
  features: [cortex-m0+, low-power, thumb]
  toolchain: arm-none-eabi
