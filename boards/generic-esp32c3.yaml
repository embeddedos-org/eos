# EoS Board: Generic ESP32-C3 (RISC-V)
board:
  name: generic-esp32c3
  mcu: ESP32-C3
  family: ESP32-C3
  arch: riscv32
  core: rv32imc
  vendor: Espressif
  clock_hz: 160000000
  memory:
    flash: 4194304
    ram: 409600
  peripherals:
    - {name: UART0, type: uart, bus: apb}
    - {name: SPI0, type: spi, bus: apb}
    - {name: I2C0, type: i2c, bus: apb}
    - {name: GPIO, type: gpio, count: 22}
    - {name: ADC, type: adc, bus: apb, channels: 6}
    - {name: WiFi, type: wifi, bus: internal}
    - {name: BLE, type: ble, bus: internal}
    - {name: TIMER0, type: timer, bus: apb}
    - {name: WDT, type: watchdog, bus: apb}
  features: [riscv32, wifi, ble]
  toolchain: riscv32-esp-elf-gcc
