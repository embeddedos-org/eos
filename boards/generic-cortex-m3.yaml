# EoS Board: Generic Cortex-M3 (STM32F103)
board:
  name: generic-cortex-m3
  mcu: STM32F103
  family: STM32F1
  arch: arm
  core: cortex-m3
  vendor: ST Microelectronics
  clock_hz: 72000000
  memory:
    flash: 524288
    ram: 65536
  peripherals:
    - {name: USART1, type: uart, bus: apb2}
    - {name: USART2, type: uart, bus: apb1}
    - {name: USART3, type: uart, bus: apb1}
    - {name: SPI1, type: spi, bus: apb2}
    - {name: SPI2, type: spi, bus: apb1}
    - {name: I2C1, type: i2c, bus: apb1}
    - {name: I2C2, type: i2c, bus: apb1}
    - {name: GPIO, type: gpio, count: 80}
    - {name: ADC1, type: adc, bus: apb2, channels: 16}
    - {name: ADC2, type: adc, bus: apb2, channels: 16}
    - {name: TIM1, type: timer, bus: apb2}
    - {name: TIM2, type: timer, bus: apb1}
    - {name: CAN1, type: can, bus: apb1}
    - {name: USB, type: usb, speed: full}
    - {name: WDT, type: watchdog, bus: apb1}
    - {name: RTC, type: rtc, bus: apb1}
    - {name: DMA1, type: dma, bus: ahb}
  features: [cortex-m3, mpu, thumb2]
  toolchain: arm-none-eabi
