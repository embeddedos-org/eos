# EoS Board: Generic S/390 (IBM z15)
board:
  name: generic-s390
  mcu: IBM-z15
  family: System-z
  arch: s390
  core: z15
  vendor: IBM
  clock_hz: 5200000000
  memory:
    flash: 0
    ram: 549755813888
  peripherals:
    - {name: UART0, type: uart, bus: apb}
    - {name: SPI0, type: spi, bus: apb}
    - {name: I2C0, type: i2c, bus: apb}
    - {name: GPIO, type: gpio, count: 64}
    - {name: ETH, type: ethernet, bus: ahb}
    - {name: USB, type: usb, speed: high}
    - {name: FICON, type: channel, bus: internal}
    - {name: WDT, type: watchdog, bus: apb}
    - {name: DMA, type: dma, bus: ahb}
  features: [s390, mmu, smp, virtualization, crypto]
  toolchain: s390x-linux-gnu-gcc
