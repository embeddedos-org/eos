# Distro Layer — Minimal
name: minimal
type: distro
description: Minimal embedded Linux distribution with BusyBox and sysvinit

init_system: busybox

packages:
  - name: musl
    version: 1.2.4
    source: https://musl.libc.org/releases/musl-1.2.4.tar.gz
    build:
      type: make

  - name: busybox
    version: 1.36.1
    source: https://busybox.net/downloads/busybox-1.36.1.tar.bz2
    build:
      type: kbuild
      defconfig: defconfig
    deps:
      - musl

rootfs:
  hostname: eos
  users:
    - name: root
      uid: 0
      gid: 0
      home: /root
      shell: /bin/sh

  filesystem:
    - path: /etc/init.d/rcS
      mode: "0755"
      content: |
        #!/bin/sh
        mount -t proc proc /proc
        mount -t sysfs sysfs /sys
        mount -t devtmpfs devtmpfs /dev
        echo "EoS booted"

  fstab:
    - device: proc
      mountpoint: /proc
      fstype: proc
    - device: sysfs
      mountpoint: /sys
      fstype: sysfs
    - device: devtmpfs
      mountpoint: /dev
      fstype: devtmpfs
