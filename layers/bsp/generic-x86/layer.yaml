# BSP Layer — Generic x86
name: generic-x86
type: bsp
description: Generic x86_64 PC BSP

machine: generic-x86
arch: x86_64

kernel:
  provider: kbuild
  defconfig: x86_64_defconfig
  image: bzImage

bootloader:
  type: grub2
  config: grub.cfg

image:
  format: raw
  size_mb: 512
  partitions:
    - name: boot
      filesystem: ext4
      size_mb: 128
      flags: boot
    - name: rootfs
      filesystem: ext4
      size_mb: 384

grub_cfg: |
  set timeout=3
  set default=0
  menuentry "EoS" {
    linux /boot/bzImage root=/dev/sda2 console=tty0 console=ttyS0,115200
  }
