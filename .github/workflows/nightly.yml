name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"  # 2:00 AM UTC daily
  workflow_dispatch:       # Manual trigger

jobs:
  native-build:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DEOS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  product-builds:
    name: Product (${{ matrix.product }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: [robot, gateway, medical, automotive, iot, aerospace]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.product }}
        run: |
          cmake -B build -DEOS_PRODUCT=${{ matrix.product }}
          cmake --build build

  cross-compile:
    name: Cross (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-linux
            toolchain: toolchains/aarch64-linux-gnu.cmake
            packages: gcc-aarch64-linux-gnu
          - arch: arm-linux-gnueabihf
            toolchain: toolchains/arm-linux-gnueabihf.cmake
            packages: gcc-arm-linux-gnueabihf
          - arch: riscv64-linux
            toolchain: toolchains/riscv64-linux-gnu.cmake
            packages: gcc-riscv64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Verify artifacts
        run: |
          echo "=== Static libraries ==="
          find build -name "*.a" | sort
          LIB_COUNT=$(find build -name "*.a" | wc -l)
          echo "Found $LIB_COUNT libraries"
          if [ "$LIB_COUNT" -lt 1 ]; then
            echo "ERROR: No libraries produced"
            exit 1
          fi

  report:
    name: Nightly Report
    runs-on: ubuntu-latest
    needs: [native-build, product-builds, cross-compile]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Nightly Regression Report — EoS"
          echo "Date: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo ""
          echo "| Job | Status |"
          echo "|---|---|"
          echo "| Native builds | ${{ needs.native-build.result }} |"
          echo "| Product builds | ${{ needs.product-builds.result }} |"
          echo "| Cross-compile | ${{ needs.cross-compile.result }} |"
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.product-builds.result }}" != "success" ] || \
             [ "${{ needs.cross-compile.result }}" != "success" ]; then
            echo ""
            echo "❌ REGRESSION DETECTED"
            exit 1
          fi
          echo ""
          echo "✅ All checks passed"
