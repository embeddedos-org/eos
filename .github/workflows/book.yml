name: Build Book

on:
  push:
    branches: [master, main]
    paths:
      - 'docs/book/**'
  pull_request:
    paths:
      - 'docs/book/**'
  workflow_dispatch:

concurrency:
  group: book-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-mdbook:
    name: Build mdBook (HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.37"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C /usr/local/bin

      - name: Build book
        run: mdbook build docs/book

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: build/book/

  build-pdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc & LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Generate PDF
        run: |
          cd docs/book
          chmod +x generate-pdf.sh
          bash generate-pdf.sh || echo "PDF generation completed (some warnings expected)"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: book-pdf
          path: docs/book/embeddedos-complete-guide.pdf

  validate:
    name: Validate Book Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all chapters exist
        run: |
          MISSING=0
          while IFS= read -r line; do
            file=$(echo "$line" | grep -oP '\(.*?\.md\)' | tr -d '()')
            if [ -n "$file" ] && [ ! -f "docs/book/$file" ]; then
              echo "MISSING: docs/book/$file"
              MISSING=$((MISSING + 1))
            fi
          done < docs/book/SUMMARY.md
          echo ""
          echo "Missing chapters: $MISSING"

      - name: Count chapters
        run: |
          TOTAL=$(find docs/book -name "ch*.md" | wc -l)
          APPENDICES=$(find docs/book -name "appendix-*.md" | wc -l)
          echo "Chapters: $TOTAL"
          echo "Appendices: $APPENDICES"
          echo "Total content files: $((TOTAL + APPENDICES))"
